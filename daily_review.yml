name: 双弦投资系统每日复盘

on:
  # 每个交易日 15:35 北京时间运行（UTC 07:35）
  schedule:
    - cron: '35 7 * * 1-5'
  # 支持手动触发（用于测试）
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Verbose mode'
        required: false
        default: 'false'

jobs:
  daily-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建数据目录
        run: |
          mkdir -p data reports

      - name: 运行双弦投资系统
        env:
          PUSH_ENABLED: 'true'
          PUSH_TYPE: serverchan
          SEND_KEY: ${{ secrets.SEND_KEY }}
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}          
          DINGTALK_TOKEN: ${{ secrets.DINGTALK_TOKEN }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          WECHAT_KEY: ${{ secrets.WECHAT_KEY }}
          OUTPUT_DIR: ./reports          
        run: |
          if [ "${{ github.event.inputs.verbose }}" == "true" ]; then
            python main.py --verbose
          else
            python main.py
          fi

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shuangxian-report-${{ github.run_date }}
          path: |
            reports/
            data/
          retention-days: 30

      - name: 生成简洁摘要
        if: always()
        run: |
          echo "## 双弦投资系统执行完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "执行时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "报告文件: reports/shuangxian_review_$(date +%Y%m%d).md" >> $GITHUB_STEP_SUMMARY

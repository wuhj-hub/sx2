name: 双弦投资系统v2.0 每日复盘

on:
  # 每个交易日 16:00 北京时间运行（收盘后1小时，UTC 08:00）
  schedule:
    - cron: '0 8 * * 1-5'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      target_date:
        description: '目标日期 YYYY-MM-DD（留空=今天）'
        required: false
        default: ''

jobs:
  shuangxian-v2:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行双弦系统v2.0
        env:
          PUSH_ENABLED: 'true'
          PUSH_TYPE: both
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SEND_KEY: ${{ secrets.SEND_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          OUTPUT_DIR: ./reports
          CACHE_DIR: ./cache
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            ARGS="--date ${{ github.event.inputs.target_date }}"
          fi
          python main.py $ARGS

      - name: 获取日期
        id: date
        run: echo "report_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shuangxian-report-${{ steps.date.outputs.report_date }}
          path: |
            reports/
            cache/
            monthly_pool/
          retention-days: 30

      - name: 缓存月度股池数据
        uses: actions/cache@v4
        with:
          path: monthly_pool/
          key: monthly-pool-${{ steps.date.outputs.report_date }}
          restore-keys: |
            monthly-pool-
